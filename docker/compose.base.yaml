services:
  # PostgreSQL Database
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: norish
      POSTGRES_DB: norish
    volumes:
      - norish_db_data:/var/lib/postgresql/data

  # Camoufox browser for recipe scraping
  camofox:
    build:
      context: ./camofox
      # Dockerfile defaults pin Camoufox 135.0.1/beta.24; pass args here only if they ever differ.
    restart: unless-stopped
    environment:
      CAMOFOX_PORT: "9377"
    shm_size: "1gb" # Firefox needs shared memory

  # Redis for real-time events
  redis:
    image: redis:8.6.2
    restart: unless-stopped
    volumes:
      - norish_redis_data:/data

volumes:
  norish_db_data:
  norish_redis_data:
