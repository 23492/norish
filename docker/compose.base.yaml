services:
  # PostgreSQL Database
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: norish
      POSTGRES_DB: norish
    volumes:
      - norish_db_data:/var/lib/postgresql/data

  # Redis for real-time events
  redis:
    image: redis:8.6.2
    restart: unless-stopped
    volumes:
      - norish_redis_data:/data

volumes:
  norish_db_data:
  norish_redis_data:
