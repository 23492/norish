# Test the locally-built Docker image with full infrastructure.
# Usage:
#   1. Build the image first:  pnpm run docker:build
#   2. Run everything:         docker compose -f docker/docker-compose.test.yml up
#   3. Open:                   http://localhost:3000
#   4. Stop:                   docker compose -f docker/docker-compose.test.yml down

services:
  norish:
    image: norishapp/norish:rc-v0.18.3-beta
    container_name: norish-app-test
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - norish_uploads:/app/uploads
    environment:
      DATABASE_URL: postgres://postgres:norish@db:5432/norish
      REDIS_URL: redis://redis:6379
      AUTH_URL: http://localhost:3000
      # Include host LAN IP for mobile app access
      TRUSTED_ORIGINS: http://localhost:3000,http://192.168.*.*:3000,exp://,exp://**,exp://192.168.*.*:*/**
      MASTER_KEY: X4fjLgB8egCPwlOQW8iC3JGXAtUIMUOGmk/y29n+YSw=
      CAMOFOX_URL: http://camofox:9377
      PASSWORD_AUTH_ENABLED: "true"
      LOG_LEVEL: debug
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://localhost:3000/api/v1/health'', r => process.exit(r.statusCode===200?0:1))"',
        ]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      camofox:
        condition: service_healthy

  # PostgreSQL Database
  db:
    image: postgres:17-alpine
    container_name: norish-db-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: norish
      POSTGRES_DB: norish
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for real-time events
  redis:
    image: redis:8.6.2
    container_name: norish-redis-test
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Camoufox browser for recipe scraping
  camofox:
    build:
      context: ./camofox
      # Dockerfile defaults pin Camoufox 135.0.1/beta.24; pass args here only if they ever differ.
    container_name: norish-camofox-test
    restart: unless-stopped
    environment:
      CAMOFOX_PORT: "9377"
    shm_size: "1gb"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://localhost:9377/health'', r => process.exit(r.statusCode===200?0:1))"',
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  db_data:
  norish_uploads:
  redis_data:
